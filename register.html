<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyConnect | Register</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <div class="logo">StudyConnect</div>
  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="login.html">Login</a></li>
      <li><a href="register.html">Register</a></li>
    </ul>
  </nav>
</header>

<main>
  <section>
    <article>
      <h1>Create Your Account</h1>
      <p>Register as an HTWG student to access the full StudyConnect prototype.</p>

      <form action="dashboard.html">
        <div>
          <label for="fullname">Full Name</label>
          <input type="text" id="fullname" name="fullname" placeholder="Your full name" required>
        </div>

        <div>
          <label for="email">HTWG Email</label>
          <input type="email" id="email" name="email" placeholder="name@htwg-konstanz.de" required>
        </div>

        <div>
          <label for="program">Study Program</label>
          <input type="text" id="program" name="program" placeholder="e.g. Applied Informatics" required>
        </div>

        <div>
          <label for="semester">Semester</label>
          <select id="semester" name="semester">
            <option value="1">1st Semester</option>
            <option value="2">2nd Semester</option>
            <option value="3">3rd Semester</option>
            <option value="4">4th Semester</option>
            <option value="5">5th Semester</option>
            <option value="6">6th Semester</option>
            <option value="7">7th Semester</option>
          </select>
        </div>

        <div>
          <label for="interest">Preferred Module</label>
          <input type="text" id="interest" name="interest" placeholder="e.g. Web Applications">
        </div>

        <div>
          <label for="format">Preferred Learning Format</label>
          <select id="format" name="format">
            <option value="online">Online</option>
            <option value="inperson">In Person</option>
            <option value="both">Both</option>
          </select>
        </div>

        <button type="submit">Create Account</button>
      </form>
    </article>
  </section>
</main>

<footer>
  <p>© 2026 StudyConnect – HTWG Konstanz Prototype</p>
</footer>

</body>
</html>
