<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyConnect | Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <div class="logo">StudyConnect</div>
  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="login.html">Login</a></li>
      <li><a href="register.html">Register</a></li>
    </ul>
  </nav>
</header>

<main>
  <section>
    <article>
      <h1>Login</h1>
      <p>Please log in to access modules, partner search, requests, profile, and chat.</p>

      <form action="dashboard.html">
        <div>
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="name@htwg-konstanz.de" required>
        </div>

        <div>
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" required>
        </div>

        <button type="submit">Login</button>
      </form>
    </article>
  </section>
</main>

<footer>
  <p>© 2026 StudyConnect – HTWG Konstanz Prototype</p>
</footer>

</body>
</html>
